<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent SLAM 2026 — Live Match</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --surface: rgba(255, 255, 255, 0.04);
    --surface-hover: rgba(255, 255, 255, 0.07);
    --border: rgba(255, 255, 255, 0.08);
    --border-light: rgba(255, 255, 255, 0.12);
    --text: #f5f5f7;
    --text-secondary: rgba(245, 245, 247, 0.6);
    --text-tertiary: rgba(245, 245, 247, 0.35);
    --cyan: #32d7ff;
    --cyan-dim: rgba(50, 215, 255, 0.15);
    --rose: #ff6b8a;
    --rose-dim: rgba(255, 107, 138, 0.15);
    --green: #30d158;
    --amber: #ffd60a;
    --red: #ff453a;
    --radius: 16px;
    --radius-sm: 10px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Setup Screen ─────────────────────────────────── */

  #setup {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, rgba(50, 215, 255, 0.06) 0%, transparent 60%);
  }

  .setup-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 32px;
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
  }

  .setup-card h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .setup-card .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }

  .field { margin-bottom: 20px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .field input, .field select {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--cyan);
    background: rgba(50, 215, 255, 0.04);
  }

  .field input::placeholder { color: var(--text-tertiary); }

  .field select {
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
  }

  .btn-connect {
    width: 100%;
    padding: 14px;
    background: var(--cyan);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn-connect:hover { opacity: 0.9; }
  .btn-connect:active { transform: scale(0.98); }
  .btn-connect:disabled { opacity: 0.4; cursor: not-allowed; }

  .setup-error {
    margin-top: 16px;
    padding: 10px 14px;
    background: rgba(255, 69, 58, 0.1);
    border: 1px solid rgba(255, 69, 58, 0.2);
    border-radius: var(--radius-sm);
    color: var(--red);
    font-size: 13px;
    display: none;
  }

  /* ── Main Dashboard ───────────────────────────────── */

  #dashboard {
    display: none;
    flex-direction: column;
    height: 100vh;
    background: radial-gradient(ellipse at 30% 0%, rgba(50, 215, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 0%, rgba(255, 107, 138, 0.03) 0%, transparent 50%);
  }

  /* ── Top Bar ──────────────────────────────────────── */

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .top-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    flex-shrink: 0;
  }

  .status-dot.disconnected {
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
  }

  .match-topic {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    max-width: 500px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .top-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  .badge-phase {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-round {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .badge-status {
    border: 1px solid;
  }

  .badge-status.started {
    background: rgba(48, 209, 88, 0.1);
    border-color: rgba(48, 209, 88, 0.2);
    color: var(--green);
  }

  .badge-status.pending {
    background: rgba(255, 214, 10, 0.1);
    border-color: rgba(255, 214, 10, 0.2);
    color: var(--amber);
  }

  .badge-status.finished {
    background: rgba(255, 255, 255, 0.06);
    border-color: var(--border);
    color: var(--text-secondary);
  }

  /* ── Info Strip ───────────────────────────────────── */

  .info-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .info-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }

  .info-label {
    color: var(--text-tertiary);
    font-weight: 400;
  }

  .info-value {
    color: var(--text);
    font-weight: 500;
    font-family: var(--mono);
    font-size: 13px;
  }

  .info-value.cyan { color: var(--cyan); }
  .info-value.rose { color: var(--rose); }
  .info-value.timer { font-size: 18px; font-weight: 600; letter-spacing: 1px; }

  .turn-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .turn-indicator.ours {
    background: var(--cyan-dim);
    color: var(--cyan);
  }

  .turn-indicator.theirs {
    background: var(--rose-dim);
    color: var(--rose);
  }

  .turn-indicator .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Message Area ─────────────────────────────────── */

  .message-area {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .message-panel {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .panel-title .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .panel-title.ours .dot { background: var(--cyan); }
  .panel-title.theirs .dot { background: var(--rose); }
  .panel-title.ours { color: var(--cyan); }
  .panel-title.theirs { color: var(--rose); }

  .panel-count {
    font-size: 12px;
    color: var(--text-tertiary);
    font-family: var(--mono);
  }

  .panel-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    scroll-behavior: smooth;
  }

  .panel-messages::-webkit-scrollbar { width: 4px; }
  .panel-messages::-webkit-scrollbar-track { background: transparent; }
  .panel-messages::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

  .message-card {
    padding: 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
  }

  .message-card.ours {
    background: var(--cyan-dim);
    border: 1px solid rgba(50, 215, 255, 0.1);
  }

  .message-card.theirs {
    background: var(--rose-dim);
    border: 1px solid rgba(255, 107, 138, 0.1);
  }

  .message-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 11px;
    color: var(--text-tertiary);
    font-family: var(--mono);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-tertiary);
    font-size: 13px;
    font-style: italic;
  }

  /* ── Bottom Bar ───────────────────────────────────── */

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .bottom-left, .bottom-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-tertiary);
  }

  .stat-value {
    color: var(--text-secondary);
    font-family: var(--mono);
    font-weight: 500;
  }

  .btn-disconnect {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-disconnect:hover {
    border-color: var(--red);
    color: var(--red);
  }

  /* ── Log Overlay ──────────────────────────────────── */

  .log-toggle {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.2s;
  }

  .log-toggle:hover { border-color: var(--border-light); color: var(--text); }

  .log-panel {
    display: none;
    position: fixed;
    bottom: 52px;
    left: 0;
    right: 0;
    height: 200px;
    background: rgba(10, 10, 12, 0.95);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow-y: auto;
    padding: 12px 24px;
    z-index: 10;
  }

  .log-panel.visible { display: block; }

  .log-entry {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    color: var(--text-tertiary);
    white-space: pre-wrap;
  }

  .log-entry.error { color: var(--red); }
  .log-entry.warn { color: var(--amber); }
  .log-entry.info { color: var(--text-secondary); }
</style>
</head>
<body>

<!-- ── Setup Screen ──────────────────────────────────── -->
<div id="setup">
  <div class="setup-card">
    <h1>Agent SLAM 2026</h1>
    <p class="subtitle">Live match spectator dashboard</p>

    <div class="field">
      <label>WebSocket URL</label>
      <input type="text" id="ws-url" placeholder="wss://agent-slam-server.fly.dev/ws?payload=...">
    </div>

    <div class="field">
      <label>Your Team</label>
      <input type="text" id="team-name" placeholder="team1">
    </div>

    <button class="btn-connect" id="btn-connect" onclick="doConnect()">Connect</button>

    <div class="setup-error" id="setup-error"></div>
  </div>
</div>

<!-- ── Main Dashboard ────────────────────────────────── -->
<div id="dashboard">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-left">
      <div class="status-dot" id="status-dot"></div>
      <span class="match-topic" id="match-topic">Waiting for match data...</span>
    </div>
    <div class="top-right">
      <span class="badge badge-round" id="badge-round">--</span>
      <span class="badge badge-phase" id="badge-phase">--</span>
      <span class="badge badge-status pending" id="badge-status">Connecting</span>
    </div>
  </div>

  <!-- Info Strip -->
  <div class="info-strip">
    <div class="info-item">
      <span class="info-label">Us</span>
      <span class="info-value cyan" id="our-team-label">--</span>
    </div>
    <div class="info-item">
      <span class="info-label">Stance</span>
      <span class="info-value cyan" id="our-stance">--</span>
    </div>
    <div class="info-item">
      <span class="info-value timer" id="timer">--:--</span>
    </div>
    <div class="info-item">
      <span class="turn-indicator" id="turn-indicator">
        <span class="pulse"></span>
        <span id="turn-text">Waiting</span>
      </span>
    </div>
    <div class="info-item">
      <span class="info-label">Opponent</span>
      <span class="info-value rose" id="opp-team-label">--</span>
    </div>
    <div class="info-item">
      <span class="info-label">Stance</span>
      <span class="info-value rose" id="opp-stance">--</span>
    </div>
  </div>

  <!-- Message Panels -->
  <div class="message-area">
    <div class="message-panel">
      <div class="panel-header">
        <span class="panel-title ours"><span class="dot"></span> Our Arguments</span>
        <span class="panel-count" id="our-count">0 messages</span>
      </div>
      <div class="panel-messages" id="our-messages">
        <div class="empty-state">Waiting for match to start...</div>
      </div>
    </div>
    <div class="message-panel">
      <div class="panel-header">
        <span class="panel-title theirs"><span class="dot"></span> Opponent Arguments</span>
        <span class="panel-count" id="opp-count">0 messages</span>
      </div>
      <div class="panel-messages" id="opp-messages">
        <div class="empty-state">Waiting for match to start...</div>
      </div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="bottom-left">
      <div class="stat">Messages <span class="stat-value" id="stat-total">0</span></div>
      <div class="stat">Avg chars <span class="stat-value" id="stat-avg-chars">--</span></div>
      <div class="stat">Est. cost <span class="stat-value" id="stat-cost">$0.00</span></div>
    </div>
    <div class="bottom-right">
      <button class="log-toggle" onclick="toggleLog()">Event Log</button>
      <button class="btn-disconnect" onclick="doDisconnect()">Disconnect</button>
    </div>
  </div>

  <!-- Log Panel -->
  <div class="log-panel" id="log-panel"></div>
</div>

<script>
(function() {
  "use strict";

  // ── State ──────────────────────────────────────────
  let ws = null;
  let teamName = "";
  let finishTimeMs = 0;
  let timerInterval = null;
  let ourMessageCount = 0;
  let oppMessageCount = 0;
  let totalChars = 0;
  let matchStatus = "pending";
  let currentTurn = "";
  let pros = "";
  let cons = "";

  // ── Helpers ────────────────────────────────────────
  function $(id) { return document.getElementById(id); }

  function isSameTeam(a, b) {
    return (a || "").trim().toLowerCase() === (b || "").trim().toLowerCase();
  }

  function formatTime(ms) {
    if (ms <= 0) return "00:00";
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
  }

  function timeNow() {
    return new Date().toLocaleTimeString("en-GB", { hour12: false });
  }

  function escapeHtml(text) {
    const d = document.createElement("div");
    d.textContent = text;
    return d.innerHTML;
  }

  // ── Persistence ────────────────────────────────────
  function saveConfig() {
    try {
      localStorage.setItem("slam_ws_url", $("ws-url").value);
      localStorage.setItem("slam_team", $("team-name").value);
    } catch(e) {}
  }

  function loadConfig() {
    try {
      const url = localStorage.getItem("slam_ws_url");
      const team = localStorage.getItem("slam_team");
      if (url) $("ws-url").value = url;
      if (team) $("team-name").value = team;
    } catch(e) {}
  }

  // ── Logging ────────────────────────────────────────
  function addLog(msg, level) {
    const panel = $("log-panel");
    const entry = document.createElement("div");
    entry.className = "log-entry " + (level || "info");
    entry.textContent = timeNow() + "  " + msg;
    panel.appendChild(entry);
    panel.scrollTop = panel.scrollHeight;
  }

  window.toggleLog = function() {
    $("log-panel").classList.toggle("visible");
  };

  // ── Connection ─────────────────────────────────────
  window.doConnect = function() {
    const url = $("ws-url").value.trim();
    teamName = $("team-name").value.trim();

    if (!url) { showSetupError("Enter a WebSocket URL"); return; }
    if (!teamName) { showSetupError("Enter your team name"); return; }

    $("btn-connect").disabled = true;
    $("btn-connect").textContent = "Connecting...";
    hideSetupError();
    saveConfig();

    try {
      ws = new WebSocket(url);
    } catch(e) {
      showSetupError("Invalid URL: " + e.message);
      $("btn-connect").disabled = false;
      $("btn-connect").textContent = "Connect";
      return;
    }

    ws.onopen = function() {
      addLog("WebSocket connected", "info");
      $("setup").style.display = "none";
      $("dashboard").style.display = "flex";
      $("status-dot").className = "status-dot";
      updateStatusBadge("pending");
      $("our-team-label").textContent = teamName;
      startTimer();
    };

    ws.onmessage = function(event) {
      try {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      } catch(e) {
        addLog("Parse error: " + e.message, "error");
      }
    };

    ws.onerror = function() {
      addLog("WebSocket error", "error");
      showSetupError("Connection failed. Check URL and try again.");
      $("btn-connect").disabled = false;
      $("btn-connect").textContent = "Connect";
    };

    ws.onclose = function(event) {
      addLog("Disconnected (code " + event.code + ")", "warn");
      $("status-dot").className = "status-dot disconnected";
      updateStatusBadge("disconnected");
    };
  };

  window.doDisconnect = function() {
    if (ws) { ws.close(); ws = null; }
    stopTimer();
    $("dashboard").style.display = "none";
    $("setup").style.display = "flex";
    $("btn-connect").disabled = false;
    $("btn-connect").textContent = "Connect";
    resetState();
  };

  function resetState() {
    ourMessageCount = 0;
    oppMessageCount = 0;
    totalChars = 0;
    matchStatus = "pending";
    currentTurn = "";
    finishTimeMs = 0;
    $("our-messages").innerHTML = '<div class="empty-state">Waiting for match to start...</div>';
    $("opp-messages").innerHTML = '<div class="empty-state">Waiting for match to start...</div>';
    $("our-count").textContent = "0 messages";
    $("opp-count").textContent = "0 messages";
    $("stat-total").textContent = "0";
    $("stat-avg-chars").textContent = "--";
    $("stat-cost").textContent = "$0.00";
    $("log-panel").innerHTML = "";
  }

  function showSetupError(msg) {
    const el = $("setup-error");
    el.textContent = msg;
    el.style.display = "block";
  }

  function hideSetupError() {
    $("setup-error").style.display = "none";
  }

  // ── Message Router ─────────────────────────────────
  function handleMessage(msg) {
    const type = msg.type || "";
    const data = msg.data || {};
    const from = msg.from || "";

    switch(type) {
      case "welcome":
        addLog("Server: " + (data.message || "Welcome"), "info");
        break;

      case "match-state":
        handleMatchState(data);
        break;

      case "match-update":
        handleMatchUpdate(data);
        break;

      case "debate-message":
        handleDebateMessage(from, data, msg.timestamp);
        break;

      case "sandbox-message":
        handleDebateMessage(from, data, msg.timestamp);
        break;

      case "previous-message":
        handlePreviousMessages(data);
        break;

      case "match-paused":
        matchStatus = "paused";
        updateStatusBadge("paused");
        addLog("Match paused", "warn");
        break;

      case "match-resumed":
        matchStatus = "started";
        if (data.finishTime) finishTimeMs = data.finishTime;
        updateStatusBadge("started");
        addLog("Match resumed", "info");
        break;

      case "match-finish":
        matchStatus = "finished";
        updateStatusBadge("finished");
        addLog("Match finished", "info");
        break;

      case "error":
        addLog("Server error: " + (data.message || JSON.stringify(data)), "error");
        break;

      case "info":
        addLog("Server: " + (data.message || ""), "info");
        break;

      default:
        addLog("Unknown: " + type + " " + JSON.stringify(data).substring(0, 80), "warn");
    }
  }

  // ── Handlers ───────────────────────────────────────
  function handleMatchState(data) {
    if (data.topic) $("match-topic").textContent = data.topic;
    if (data.round) $("badge-round").textContent = data.round;
    if (data.finishTime) finishTimeMs = data.finishTime;
    if (data.status) {
      matchStatus = data.status;
      updateStatusBadge(data.status);
    }
    if (data.turn) {
      currentTurn = data.turn;
      updateTurnIndicator();
    }
    if (data.pros) pros = data.pros;
    if (data.cons) cons = data.cons;

    updateStances();
    updatePhase();
    addLog("State: turn=" + (data.turn||"?") + " status=" + (data.status||"?"), "info");
  }

  function handleMatchUpdate(data) {
    if (data.finishTime) finishTimeMs = data.finishTime;
    matchStatus = "started";
    updateStatusBadge("started");
    addLog("Match started. Timer running.", "info");
  }

  function handleDebateMessage(from, data, timestamp) {
    const text = data.message || "";
    const isOurs = isSameTeam(from, teamName);
    const charCount = text.length;

    if (isOurs) {
      ourMessageCount++;
      totalChars += charCount;
      appendMessage("our-messages", text, charCount, ourMessageCount, true);
      $("our-count").textContent = ourMessageCount + " message" + (ourMessageCount !== 1 ? "s" : "");
    } else {
      oppMessageCount++;
      appendMessage("opp-messages", text, charCount, oppMessageCount, false);
      $("opp-count").textContent = oppMessageCount + " message" + (oppMessageCount !== 1 ? "s" : "");
    }

    const total = ourMessageCount + oppMessageCount;
    $("stat-total").textContent = total;
    if (ourMessageCount > 0) {
      $("stat-avg-chars").textContent = Math.round(totalChars / ourMessageCount);
    }

    // Rough cost estimate: ~$0.38 per 10-turn match
    const estCost = ourMessageCount * 0.038;
    $("stat-cost").textContent = "$" + estCost.toFixed(2);

    updatePhase();
    addLog((isOurs ? "US" : "OPP") + " #" + (isOurs ? ourMessageCount : oppMessageCount) + ": " + charCount + " chars", "info");
  }

  function handlePreviousMessages(data) {
    const conversations = data.conversations || [];
    conversations.forEach(function(entry) {
      const isOurs = isSameTeam(entry.team, teamName);
      const text = entry.message || "";
      if (isOurs) {
        ourMessageCount++;
        totalChars += text.length;
        appendMessage("our-messages", text, text.length, ourMessageCount, true);
      } else {
        oppMessageCount++;
        appendMessage("opp-messages", text, text.length, oppMessageCount, false);
      }
    });

    $("our-count").textContent = ourMessageCount + " message" + (ourMessageCount !== 1 ? "s" : "");
    $("opp-count").textContent = oppMessageCount + " message" + (oppMessageCount !== 1 ? "s" : "");
    $("stat-total").textContent = ourMessageCount + oppMessageCount;
    if (ourMessageCount > 0) {
      $("stat-avg-chars").textContent = Math.round(totalChars / ourMessageCount);
    }
    addLog("Loaded " + conversations.length + " previous messages", "info");
  }

  // ── UI Updates ─────────────────────────────────────
  function appendMessage(panelId, text, charCount, num, isOurs) {
    const panel = $(panelId);
    // Remove empty state
    const empty = panel.querySelector(".empty-state");
    if (empty) empty.remove();

    const card = document.createElement("div");
    card.className = "message-card " + (isOurs ? "ours" : "theirs");

    const body = document.createElement("div");
    body.textContent = text;

    const meta = document.createElement("div");
    meta.className = "message-meta";
    meta.innerHTML = '<span>#' + num + '</span><span>' + charCount + ' chars</span><span>' + timeNow() + '</span>';

    card.appendChild(body);
    card.appendChild(meta);
    panel.appendChild(card);
    panel.scrollTop = panel.scrollHeight;
  }

  function updateStatusBadge(status) {
    const badge = $("badge-status");
    badge.className = "badge badge-status " + status;
    const labels = {
      pending: "Pending", active: "Active", started: "Live", paused: "Paused",
      finished: "Finished", disconnected: "Disconnected"
    };
    badge.textContent = labels[status] || status;
  }

  function updateTurnIndicator() {
    const el = $("turn-indicator");
    const text = $("turn-text");
    if (isSameTeam(currentTurn, teamName)) {
      el.className = "turn-indicator ours";
      text.textContent = "Our Turn";
    } else {
      el.className = "turn-indicator theirs";
      text.textContent = "Their Turn";
    }
  }

  function updateStances() {
    if (isSameTeam(teamName, pros)) {
      $("our-stance").textContent = "PRO";
      $("opp-stance").textContent = "CON";
    } else if (isSameTeam(teamName, cons)) {
      $("our-stance").textContent = "CON";
      $("opp-stance").textContent = "PRO";
    }

    // Determine opponent name
    const t1 = $("match-topic").dataset.team1 || "";
    const t2 = $("match-topic").dataset.team2 || "";
    if (!isSameTeam(t1, teamName) && t1) {
      $("opp-team-label").textContent = t1;
    } else if (!isSameTeam(t2, teamName) && t2) {
      $("opp-team-label").textContent = t2;
    }
  }

  function updatePhase() {
    const remaining = finishTimeMs > 0 ? Math.max(0, (finishTimeMs - Date.now()) / 1000) : 999;
    let phase = "Waiting";
    if (matchStatus === "started" || matchStatus === "active") {
      if (ourMessageCount === 0) phase = "Opening";
      else if (remaining < 180 && ourMessageCount >= 6) phase = "Closing";
      else if (ourMessageCount === 1) phase = "Rebuttal";
      else if (ourMessageCount <= 3) phase = "Cross-Exam";
      else phase = "Defense";
    } else if (matchStatus === "finished") {
      phase = "Finished";
    }
    $("badge-phase").textContent = phase;
  }

  // ── Timer ──────────────────────────────────────────
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      if (finishTimeMs > 0) {
        const remaining = Math.max(0, finishTimeMs - Date.now());
        $("timer").textContent = formatTime(remaining);
        if (remaining <= 60000) {
          $("timer").style.color = "var(--red)";
        } else if (remaining <= 180000) {
          $("timer").style.color = "var(--amber)";
        } else {
          $("timer").style.color = "var(--text)";
        }
      }
      updatePhase();
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  // ── Init ───────────────────────────────────────────
  loadConfig();
})();
</script>
</body>
</html>
